<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor Game</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <style>
      .poppins-regular {
        font-family: "Poppins", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background-color: #0a2239;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 1.5rem;
        color: white;
      }

      .game-container {
        width: 100%;
        max-width: 1000px;
        backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1.8rem;
        padding: 2rem 1.9rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }
      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      header h1 {
        font-size: 2.2rem;
        margin-bottom: 0.8rem;
      }
      header p {
        color: #cbd5e1;
      }
      #reset {
        /* display: none; */
        font-size: 1.1rem;
        margin-top: 0.8rem;
        border-radius: 0.8rem;
        border: transparent;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        margin-left: 0.9rem;
        padding: 0.3rem 1.2rem;
      }
      #reset:hover {
        transform: scale(0.95);
      }
      #reset:active {
        background: rgba(255, 255, 255, 0.3);
      }
      .scoreboard {
        display: flex;
        justify-content: center;
        gap: 1.8rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .score-card {
        width: 10rem;
        text-align: center;
        padding: 1.25rem;
        border-radius: 1.125rem;
        background: rgba(255, 255, 255, 0.08);
      }

      .score-card h2 {
        font-size: 1rem;
        margin-bottom: 0.625rem;
      }

      .score-card span {
        font-size: 1.5rem;
        font-weight: bold;
      }
      .battle-arena {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 2rem;
        margin-bottom: 1.2rem;
      }
      .player-box {
        flex: 1;
        text-align: center;
      }

      .player-box h3 {
        margin-bottom: 0.6rem;
        color: #cbd5e1;
      }
      .choice-display {
        width: 7.5rem;
        height: 7.5rem;
        margin: auto;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5rem;
      }
      .vs {
        font-size: 2.4rem;
        font-weight: bold;
      }
      .choices {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .choice-btn {
        width: 8.4rem;
        height: 8.4rem;
        border: none;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.514);
        color: #111827;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        /* gap: 0.925rem; */
        font-size: 2.4rem;
        transition: 0.1s;
        margin-bottom: 1rem;
      }

      .choice-btn span {
        font-size: 1rem;
        font-weight: 600;
      }

      .choice-btn:hover {
        transform: scale(0.95);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      }
      .choice-btn:active {
        background: rgba(255, 255, 255, 0.3);
      }
      .result-box p {
        font-size: 1.2rem;
        font-weight: 600;
        text-align: center;
      }

      footer {
        text-align: center;
        font-size: 0.8rem;
      }
      /* Tablet */
      @media (max-width: 768px) {
        .game-container {
          padding: 1.5rem;
        }

        header h1 {
          font-size: 1.8rem;
        }

        .battle-arena {
          gap: 1rem;
        }

        .choice-display {
          width: 6rem;
          height: 6rem;
          font-size: 2rem;
        }

        .choice-btn {
          width: 7rem;
          height: 7rem;
          font-size: 2rem;
        }

        .vs {
          font-size: 2rem;
        }
      }

      /* Mobile */
      @media (max-width: 480px) {
        body {
          padding: 1rem;
        }

        .game-container {
          padding: 1.2rem;
          border-radius: 1.2rem;
        }

        header h1 {
          font-size: 1.3rem;
        }

        .scoreboard {
          gap: 0.8rem;
        }

        .score-card {
          width: 5rem;
          padding: 0.5rem;
        }

        .score-card h2 {
          font-size: 0.8rem;
        }

        .score-card span {
          font-size: 1.2rem;
        }

        .battle-arena {
          font-size: 0.75rem;
          flex-direction: row;
          gap: 1rem;
        }

        .vs {
          font-size: 1.5rem;
        }

        .choice-display {
          width: 5rem;
          height: 5rem;
          font-size: 1.8rem;
        }

        .choices {
          gap: 0.8rem;
        }

        .choice-btn {
          width: 5.5rem;
          height: 5.5rem;
          font-size: 1.6rem;
          border-radius: 1rem;
        }

        .choice-btn span {
          font-size: 0.8rem;
        }
        .result-box p {
          font-size: 1rem;
        }

        footer {
          font-size: 0.7rem;
        }
      }
    </style>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
  </head>
  <body>
    <div class="game-container">
      <header>
        <h1 id="game-heading">Rock Paper Scissor Game</h1>
        <div class="result-box">
          <p id="result">Choose your move!</p>
          <button id="reset">Reset</button>
        </div>
      </header>
      <div class="scoreboard">
        <div class="score-card">
          <h2>You</h2>
          <span id="user-score">0</span>
        </div>
        <div class="score-card">
          <h2>Draw</h2>
          <span id="draw-score">0</span>
        </div>
        <div class="score-card">
          <h2>Computer</h2>
          <span id="computer-score">0</span>
        </div>
      </div>

      <div class="battle-arena">
        <div class="player-box">
          <h3>Your Choice</h3>
          <div class="choice-display" id="user-choice">?</div>
        </div>
        <div class="vs">VS</div>

        <div class="player-box">
          <h3>Computer</h3>
          <div class="choice-display" id="computer-choice">?</div>
        </div>
      </div>
      <div class="choices">
        <button class="choice-btn" id="rock">
          🪨
          <span>Rock</span>
        </button>

        <button class="choice-btn" id="paper">
          📄
          <span>Paper</span>
        </button>

        <button class="choice-btn" id="scissor">
          ✂️
          <span>Scissor</span>
        </button>
      </div>
      <footer>
        <p>Made by Shashank❤️</p>
      </footer>
    </div>

    <script>
      const choices = ["rock", "paper", "scissor"];

      const rockBtn = document.getElementById("rock");
      const paperBtn = document.getElementById("paper");
      const scissorBtn = document.getElementById("scissor");

      const userChoiceDisplay = document.getElementById("user-choice");
      const computerChoiceDisplay = document.getElementById("computer-choice");

      const userScoreDisplay = document.getElementById("user-score");
      const computerScoreDisplay = document.getElementById("computer-score");
      const drawScoreDisplay = document.getElementById("draw-score");

      const result = document.getElementById("result");
      const resetBtn = document.getElementById("reset");

      let userScore = 0;
      let computerScore = 0;
      let draw = 0;

      const emojis = {
        rock: "🪨",
        paper: "📄",
        scissor: "✂️",
      };

      function getComputerChoice() {
        const randomIndex = Math.floor(Math.random() * choices.length);
        return choices[randomIndex];
      }

      reset.addEventListener("click", () => {
        userScore = 0;
        computerScore = 0;
        draw = 0;
        userChoiceDisplay.textContent = "?";
        computerChoiceDisplay.textContent = "?";
        userScoreDisplay.textContent = userScore;
        computerScoreDisplay.textContent = computerScore;
        drawScoreDisplay.textContent = draw;
      });

      function playGame(userChoice) {
        const computerChoice = getComputerChoice();

        userChoiceDisplay.textContent = emojis[userChoice];
        computerChoiceDisplay.textContent = emojis[computerChoice];

        if (userChoice === computerChoice) {
          draw++;
          result.textContent = "🤝 It's a Draw!";
          drawScoreDisplay.textContent = draw;
          return;
        }

        const userWins =
          (userChoice === "rock" && computerChoice === "scissor") ||
          (userChoice === "paper" && computerChoice === "rock") ||
          (userChoice === "scissor" && computerChoice === "paper");

        if (userWins) {
          userScore++;
          userScoreDisplay.textContent = userScore;
          result.textContent = `🎉 You Win! ${userChoice} beats ${computerChoice}`;
        } else {
          computerScore++;
          computerScoreDisplay.textContent = computerScore;
          result.textContent = `Computer Wins! ${computerChoice} beats ${userChoice}`;
        }
      }

      rockBtn.addEventListener("click", () => {
        playGame("rock");
      });

      paperBtn.addEventListener("click", () => {
        playGame("paper");
      });

      scissorBtn.addEventListener("click", () => {
        playGame("scissor");
      });
    </script>
    <!-- <script src="script.js"></script> -->
  </body>
</html>
